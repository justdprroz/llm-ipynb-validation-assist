server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS: re-resolve ``backend`` on each request window so after ``docker compose``
    # recreates the API container (new IP), we do not keep connecting to a dead address
    # (symptom: HTTP 502 / ``connect() failed (111: Connection refused)`` in nginx error log).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
